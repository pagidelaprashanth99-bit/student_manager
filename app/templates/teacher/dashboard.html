{% extends "base.html" %}

{% block content %}

<h2>Student Dashboard</h2>

<table border="1" cellpadding="10">

    <tr>
        <th>Subject</th>
        <th>Attended Classes</th>
        <th>Total Classes</th>
        <th>Attendance Percentage</th>
    </tr>

    {% for item in result %}
    <tr>

        <td>{{ item.subject }}</td>

        <td>{{ item.attended }}</td>

        <td>{{ item.total }}</td>

        <td>{{ item.percentage }}%</td>

    </tr>
    {% endfor %}

</table>

{% endblock %}
