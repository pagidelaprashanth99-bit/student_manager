{% extends "base.html" %}

{% block content %}

<h2>Manage Students</h2>

<a href="{{ url_for('teacher.dashboard') }}">Back to Dashboard</a>
<br><br>

<a href="{{ url_for('teacher.add_student') }}">Add New Student</a>

<br><br>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Student Name</th>
        <th>Actions</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>
            <a href="{{ url_for('teacher.edit_student', student_id=student.id) }}">
                Edit
            </a>
            |
            <a href="{{ url_for('teacher.delete_student', student_id=student.id) }}"
               onclick="return confirm('Are you sure you want to delete this student?')">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
