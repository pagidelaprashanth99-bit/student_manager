<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h2>Students List</h2>

<form method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search Student"
        value="{{ search }}"
    >

    <button type="submit">Search</button>

</form>

<br>

<table border="1" cellpadding="10">

    <tr>
        <th>Student ID</th>
        <th>Name</th>
    </tr>

    {% for student in students %}

    <tr>
        <td>{{ student.student_code }}</td>
        <td>{{ student.name }}</td>
    </tr>

    {% endfor %}

</table>

<br>

<a href="{{ url_for('teacher.dashboard') }}">
    Back
</a>

</body>
</html>
