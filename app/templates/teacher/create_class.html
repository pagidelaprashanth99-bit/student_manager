{% extends "base.html" %}
{% block content %}
<div class="content-container">
    <h2>Create Class Schedule</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="post">
        <label>Class Name:</label>
        <input type="text" name="class_name" placeholder="e.g., Mathematics, Science" required>
        
        <label>Class Date:</label>
        <input type="date" name="class_date" required>
        
        <label>Start Time:</label>
        <input type="time" name="start_time" required>
        
        <label>End Time:</label>
        <input type="time" name="end_time" required>
        
        <div style="margin-top: 20px;">
            <button type="submit">Create Class</button>
            <button type="submit" name="add_another" value="1" style="margin-left: 10px; background: #4CAF50;">Create Another</button>
            <a href="/teacher" style="margin-left: 10px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
