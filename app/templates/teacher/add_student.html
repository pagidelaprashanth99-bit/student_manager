{% extends "base.html" %}
{% block content %}
<div class="content-container">
    <h2>Add Student</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <form method="post">
        <label>Student Name:</label>
        <input name="name" placeholder="Enter student name" required>
        
        <label>Username:</label>
        <input name="username" placeholder="Enter username" required>
        
        <label>Password:</label>
        <input name="password" type="password" placeholder="Enter password" required>
        
        <div style="margin-top: 20px;">
            <button type="submit">Add Student</button>
            <button type="submit" name="add_another" value="1" style="margin-left: 10px; background: #4CAF50;">Add Another</button>
            <a href="/teacher" style="margin-left: 10px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
