<!DOCTYPE html>
<html>
<head>
    <title>Take Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Take Attendance</h2>

<h3>
    {{ class_data.class_name }}
</h3>

<p>
    {{ class_data.class_date }}
</p>

<p>
    {{ class_data.start_time }}
    to
    {{ class_data.end_time }}
</p>

<form method="POST">

<table border="1" cellpadding="10">

    <tr>
        <th>Student ID</th>
        <th>Name</th>
        <th>Status</th>
    </tr>

    {% for student in students %}

    <tr>

        <td>
            {{ student.student_code }}
        </td>

        <td>
            {{ student.name }}
        </td>

        <td>

            <select
                name="status_{{ student.id }}"
            >

                <option value="Present">
                    Present
                </option>

                <option value="Absent">
                    Absent
                </option>

            </select>

        </td>

    </tr>

    {% endfor %}

</table>

<br>

<button type="submit">
    Save Attendance
</button>

</form>

<br>

<a href="{{ url_for('teacher.dashboard') }}">
    Back
</a>

</body>
</html>
