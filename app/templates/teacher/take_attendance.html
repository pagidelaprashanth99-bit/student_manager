{% extends "base.html" %}

{% block content %}

<h2>Mark Attendance</h2>

<h3>{{ class_schedule.class_name }}</h3>

<p>
    {{ class_schedule.class_date }}
    <br>
    {{ class_schedule.start_time }} - {{ class_schedule.end_time }}
</p>

<form method="POST">

<table border="1" cellpadding="10">

    <tr>
        <th>Student Name</th>
        <th>Status</th>
    </tr>

    {% for student in students %}
    <tr>

        <td>{{ student.name }}</td>

        <td>

            <select name="status_{{ student.id }}">

                <option value="present"
                    {% if attendance_map.get(student.id) == True %}
                        selected
                    {% endif %}
                >
                    Present
                </option>

                <option value="absent"
                    {% if attendance_map.get(student.id) == False %}
                        selected
                    {% endif %}
                >
                    Absent
                </option>

            </select>

        </td>

    </tr>
    {% endfor %}

</table>

<br>

<button type="submit">
    Save Attendance
</button>

</form>

{% endblock %}
